services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - vendor:/app/vendor
    working_dir: /app
    command: tail -f /dev/null
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: live_table_test
      DB_USERNAME: live_table
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: live_table_test
      MYSQL_USER: live_table
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "live_table", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vendor:
  db_data:
